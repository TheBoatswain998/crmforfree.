

Вопрос 1. Определители второго и третьего порядка, их вычисление и свойства.

Ответ:
Определитель (детерминант) — числовая характеристика квадратной матрицы.

Формулы:
• Второго порядка:
|a b|
|c d| = ad − bc

• Третьего порядка (правило Саррюса):
|a₁ b₁ c₁|
|a₂ b₂ c₂| = a₁b₂c₃ + b₁c₂a₃ + c₁a₂b₃ − c₁b₂a₃ − a₁c₂b₃ − b₁a₂c₃
|a₃ b₃ c₃|

Свойства определителей:
1. Определитель не меняется при транспонировании: det(A) = det(Aᵀ)
2. При перестановке двух строк (столбцов) знак меняется на противоположный
3. Общий множитель строки (столбца) можно выносить за знак определителя
4. Если строка (столбец) состоит из нулей → определитель равен 0
5. Если две строки (столбца) пропорциональны → определитель равен 0
6. Определитель произведения матриц: det(AB) = det(A) · det(B)

Пример:
|2 3|
|4 5| = 2·5 − 3·4 = 10 − 12 = −2

---

Вопрос 2. Определители n-го порядка, их вычисление.

Ответ:
Определитель n-го порядка вычисляется через разложение по строке или столбцу с использованием алгебраических дополнений.

Формула разложения по i-й строке:
det(A) = Σ (j=1 до n) aᵢⱼ · Aᵢⱼ, где Aᵢⱼ = (−1)ⁱ⁺ʲ · Mᵢⱼ

Mᵢⱼ — минор (определитель матрицы (n−1)×(n−1), полученной вычёркиванием i-й строки и j-го столбца)
Aᵢⱼ — алгебраическое дополнение элемента aᵢⱼ

Практический метод:
Привести матрицу к треугольному виду элементарными преобразованиями строк → определитель равен произведению элементов главной диагонали.

Пример (разложение по первой строке):
|1 2 0|
|3 4 5| = 1·|4 5| − 2·|3 5| + 0·|3 4| = 1·(4·6−5·0) − 2·(3·6−5·1) = 24 − 2·13 = −2
|1 0 6|     |0 6|     |1 6|     |1 0|

