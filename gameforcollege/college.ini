Вопрос 3. Матрицы: определение, виды, операции над матрицами.

Ответ:
Матрица — прямоугольная таблица чисел, состоящая из m строк и n столбцов. Обозначается A = (aᵢⱼ)ₘₓₙ, где aᵢⱼ — элемент на пересечении i-й строки и j-го столбца.

Виды матриц:
• Прямоугольная — m ≠ n
• Квадратная — m = n (порядок = n)
• Диагональная — все элементы вне главной диагонали равны 0
• Единичная E — диагональная, у которой aᵢᵢ = 1
• Нулевая O — все элементы равны 0
• Транспонированная Aᵀ — строки и столбцы поменяны местами (aᵢⱼᵀ = aⱼᵢ)

Операции над матрицами:

1. Сложение (A + B):
   • Возможна только для матриц одинакового размера
   • Формула: cᵢⱼ = aᵢⱼ + bᵢⱼ

2. Умножение на число (λ·A):
   • Формула: bᵢⱼ = λ·aᵢⱼ

3. Умножение матриц (C = A·B):
   • Возможна, если число столбцов A = числу строк B
   • Формула: cᵢⱼ = Σ (k=1 до n) aᵢₖ·bₖⱼ
   • Важно: AB ≠ BA (в общем случае)

4. Обратная матрица (A⁻¹):
   • Существует только для невырожденных квадратных матриц (det A ≠ 0)
   • Формула: A⁻¹ = (1 / det A) · adj(A)
   • adj(A) — присоединённая матрица (транспонированная матрица алгебраических дополнений)
   • Свойство: A·A⁻¹ = A⁻¹·A = E

Пример умножения:
A = |1 2|   B = |0 1|
    |3 4|       |1 0|

AB = |1·0+2·1   1·1+2·0| = |2 1|
     |3·0+4·1   3·1+4·0|   |4 3|


Вопрос 4. Системы линейных уравнений. Метод Крамера.

Ответ:
Система линейных уравнений (СЛАУ) — набор уравнений вида:
a₁₁x₁ + a₁₂x₂ + … + a₁ₙxₙ = b₁
a₂₁x₁ + a₂₂x₂ + … + a₂ₙxₙ = b₂
…
aₙ₁x₁ + aₙ₂x₂ + … + aₙₙxₙ = bₙ

Метод Крамера применяется для квадратных систем (число уравнений = числу неизвестных) с ненулевым определителем основной матрицы.

Формулы:
Δ = |aᵢⱼ| — определитель основной матрицы системы
Δₓₖ — определитель, полученный заменой k-го столбца на столбец свободных членов (b₁, b₂, …, bₙ)

Решение:
xₖ = Δₓₖ / Δ, где Δ ≠ 0

Пример:
{ 2x + y = 5
{ x − 3y = −1

Δ = |2  1| = 2·(−3) − 1·1 = −6 − 1 = −7
    |1 −3|

Δₓ = |5  1| = 5·(−3) − 1·(−1) = −15 + 1 = −14
     |−1 −3|

Δᵧ = |2  5| = 2·(−1) − 5·1 = −2 − 5 = −7
     |1 −1|

x = Δₓ/Δ = (−14)/(−7) = 2
y = Δᵧ/Δ = (−7)/(−7) = 1

Ответ: (2; 1)

---

Вопрос 5. Системы линейных уравнений. Метод Гаусса.

Ответ:
Метод Гаусса — последовательное исключение неизвестных путём элементарных преобразований строк расширенной матрицы системы.

Алгоритм:
1. Записать расширенную матрицу [A|B]
2. Привести матрицу к ступенчатому (треугольному) виду:
   • Перестановка строк
   • Умножение строки на число ≠ 0
   • Прибавление к строке другой строки, умноженной на число
3. Обратный ход: выразить неизвестные снизу вверх

Пример:
{ x + 2y − z = 3
{ 2x − y + z = 1
{ 3x + y − 2z = 4

Расширенная матрица:
[1  2 −1 | 3]
[2 −1  1 | 1]
[3  1 −2 | 4]

Шаг 1: исключить x из 2-й и 3-й строк:
R₂ ← R₂ − 2R₁ → [0 −5  3 | −5]
R₃ ← R₃ − 3R₁ → [0 −5  1 | −5]

Шаг 2: исключить y из 3-й строки:
R₃ ← R₃ − R₂ → [0  0 −2 |  0]

Получили:
[1  2 −1 | 3]
[0 −5  3 | −5]
[0  0 −2 | 0]

Обратный ход:
−2z = 0 → z = 0
−5y + 3·0 = −5 → y = 1
x + 2·1 − 0 = 3 → x = 1

Ответ: (1; 1; 0)



Вопрос 6. Векторы: определение, линейные операции над векторами.

Ответ:
Вектор — направленный отрезок, характеризующийся длиной (модулем) и направлением. Обозначается: $\vec{a}$, $\overrightarrow{AB}$.

Линейные операции:

1. Сложение векторов ($\vec{a} + \vec{b}$):
   • Правило треугольника: конец $\vec{a}$ соединяется с началом $\vec{b}$
   • Правило параллелограмма: векторы откладываются из одной точки
   • Координатная форма: если $\vec{a} = (a_1, a_2, a_3)$, $\vec{b} = (b_1, b_2, b_3)$, то $\vec{a} + \vec{b} = (a_1+b_1, a_2+b_2, a_3+b_3)$

2. Вычитание векторов ($\vec{a} - \vec{b}$):
   $\vec{a} - \vec{b} = \vec{a} + (-\vec{b})$
   Координатная форма: $(a_1-b_1, a_2-b_2, a_3-b_3)$

3. Умножение вектора на число ($\lambda \vec{a}$):
   • Длина: $|\lambda \vec{a}| = |\lambda| \cdot |\vec{a}|$
   • Направление: совпадает с $\vec{a}$ при $\lambda > 0$, противоположно при $\lambda < 0$
   • Координатная форма: $\lambda \vec{a} = (\lambda a_1, \lambda a_2, \lambda a_3)$

Свойства линейных операций:
• $\vec{a} + \vec{b} = \vec{b} + \vec{a}$ (коммутативность)
• $(\vec{a} + \vec{b}) + \vec{c} = \vec{a} + (\vec{b} + \vec{c})$ (ассоциативность)
• $\lambda(\mu \vec{a}) = (\lambda\mu)\vec{a}$
• $(\lambda + \mu)\vec{a} = \lambda\vec{a} + \mu\vec{a}$
• $\lambda(\vec{a} + \vec{b}) = \lambda\vec{a} + \lambda\vec{b}$

Пример:
$\vec{a} = (2, -1, 3)$, $\vec{b} = (1, 4, -2)$
$\vec{a} + 2\vec{b} = (2, -1, 3) + (2, 8, -4) = (4, 7, -1)$

---

Вопрос 7. Проекция вектора на ось.

Ответ:
Проекция вектора $\vec{a}$ на ось $l$ — алгебраическая величина, равная длине отрезка, соединяющего проекции начала и конца вектора на ось, взятая со знаком «+», если направление проекции совпадает с направлением оси, и «−» в противном случае.

Формула:
$$\operatorname{пр}_l \vec{a} = |\vec{a}| \cdot \cos \varphi$$
где $\varphi$ — угол между вектором $\vec{a}$ и положительным направлением оси $l$.

Свойства проекции:
1. $\operatorname{пр}_l (\vec{a} + \vec{b}) = \operatorname{пр}_l \vec{a} + \operatorname{пр}_l \vec{b}$
2. $\operatorname{пр}_l (\lambda \vec{a}) = \lambda \cdot \operatorname{пр}_l \vec{a}$

В координатах (декартова система):
Если $\vec{a} = (a_x, a_y, a_z)$, то:
$\operatorname{пр}_{Ox} \vec{a} = a_x$, $\operatorname{пр}_{Oy} \vec{a} = a_y$, $\operatorname{пр}_{Oz} \vec{a} = a_z$

Пример:
$\vec{a} = (3, 4, 0)$, угол с осью $Ox$ равен $\varphi$, $\cos\varphi = 3/5$
$\operatorname{пр}_{Ox} \vec{a} = |\vec{a}| \cos\varphi = 5 \cdot 3/5 = 3$ (совпадает с координатой $a_x$)



Вопрос 8. Скалярное произведение векторов, его свойства и вычисление.

Ответ:
Скалярное произведение двух векторов — число, равное произведению их длин на косинус угла между ними.

Формулы:
• Геометрическая: $\vec{a} \cdot \vec{b} = |\vec{a}| \cdot |\vec{b}| \cdot \cos \varphi$, где $\varphi$ — угол между векторами
• Координатная (в $\mathbb{R}^3$): $\vec{a} \cdot \vec{b} = a_x b_x + a_y b_y + a_z b_z$
• Угол между векторами: $\cos \varphi = \dfrac{\vec{a} \cdot \vec{b}}{|\vec{a}| \cdot |\vec{b}|}$

Свойства:
1. $\vec{a} \cdot \vec{b} = \vec{b} \cdot \vec{a}$ (коммутативность)
2. $(\lambda \vec{a}) \cdot \vec{b} = \lambda (\vec{a} \cdot \vec{b})$
3. $(\vec{a} + \vec{b}) \cdot \vec{c} = \vec{a} \cdot \vec{c} + \vec{b} \cdot \vec{c}$ (дистрибутивность)
4. $\vec{a} \cdot \vec{a} = |\vec{a}|^2 \geq 0$, причём $\vec{a} \cdot \vec{a} = 0 \Leftrightarrow \vec{a} = \vec{0}$
5. $\vec{a} \perp \vec{b} \Leftrightarrow \vec{a} \cdot \vec{b} = 0$ (условие перпендикулярности)

Пример:
$\vec{a} = (2, -1, 3)$, $\vec{b} = (1, 4, 0)$
$\vec{a} \cdot \vec{b} = 2 \cdot 1 + (-1) \cdot 4 + 3 \cdot 0 = 2 - 4 + 0 = -2$
$|\vec{a}| = \sqrt{2^2 + (-1)^2 + 3^2} = \sqrt{14}$
$|\vec{b}| = \sqrt{1^2 + 4^2 + 0^2} = \sqrt{17}$
$\cos \varphi = \dfrac{-2}{\sqrt{14} \cdot \sqrt{17}} = -\dfrac{2}{\sqrt{238}}$

---

Вопрос 9. Векторное произведение векторов, его свойства и вычисление.

Ответ:
Векторное произведение — вектор, перпендикулярный обоим исходным векторам, длина которого равна площади параллелограмма, построенного на этих векторах.

Формулы:
• Геометрическая: $|\vec{a} \times \vec{b}| = |\vec{a}| \cdot |\vec{b}| \cdot \sin \varphi$
• Координатная (определитель):
$$\vec{a} \times \vec{b} = \begin{vmatrix}
\vec{i} & \vec{j} & \vec{k} \\
a_x & a_y & a_z \\
b_x & b_y & b_z
\end{vmatrix} = (a_y b_z - a_z b_y)\vec{i} - (a_x b_z - a_z b_x)\vec{j} + (a_x b_y - a_y b_x)\vec{k}$$

Свойства:
1. $\vec{a} \times \vec{b} = -(\vec{b} \times \vec{a})$ (антикоммутативность)
2. $(\lambda \vec{a}) \times \vec{b} = \lambda (\vec{a} \times \vec{b})$
3. $(\vec{a} + \vec{b}) \times \vec{c} = \vec{a} \times \vec{c} + \vec{b} \times \vec{c}$
4. $\vec{a} \times \vec{a} = \vec{0}$
5. $\vec{a} \parallel \vec{b} \Leftrightarrow \vec{a} \times \vec{b} = \vec{0}$ (условие коллинеарности)
6. Направление определяется по правилу правой руки

Пример:
$\vec{a} = (1, 2, 3)$, $\vec{b} = (4, 5, 6)$
$\vec{a} \times \vec{b} = \begin{vmatrix}
\vec{i} & \vec{j} & \vec{k} \\
1 & 2 & 3 \\
4 & 5 & 6
\end{vmatrix} = (2 \cdot 6 - 3 \cdot 5)\vec{i} - (1 \cdot 6 - 3 \cdot 4)\vec{j} + (1 \cdot 5 - 2 \cdot 4)\vec{k} =$
$= (12 - 15)\vec{i} - (6 - 12)\vec{j} + (5 - 8)\vec{k} = -3\vec{i} + 6\vec{j} - 3\vec{k} = (-3, 6, -3)$

---

Вопрос 10. Смешанное произведение векторов.

Ответ:
Смешанное произведение трёх векторов — скаляр, равный скалярному произведению векторного произведения двух векторов на третий.

Формулы:
• Определение: $(\vec{a}, \vec{b}, \vec{c}) = (\vec{a} \times \vec{b}) \cdot \vec{c}$
• Координатная (определитель 3-го порядка):
$$(\vec{a}, \vec{b}, \vec{c}) = \begin{vmatrix}
a_x & a_y & a_z \\
b_x & b_y & b_z \\
c_x & c_y & c_z
\end{vmatrix}$$

Геометрический смысл:
Модуль смешанного произведения равен объёму параллелепипеда, построенного на векторах $\vec{a}, \vec{b}, \vec{c}$:
$V = |(\vec{a}, \vec{b}, \vec{c})|$

Свойства:
1. Циклическая перестановка не меняет значение: $(\vec{a}, \vec{b}, \vec{c}) = (\vec{b}, \vec{c}, \vec{a}) = (\vec{c}, \vec{a}, \vec{b})$
2. Перестановка двух векторов меняет знак: $(\vec{a}, \vec{b}, \vec{c}) = -(\vec{b}, \vec{a}, \vec{c})$
3. $(\vec{a}, \vec{b}, \vec{c}) = 0 \Leftrightarrow$ векторы компланарны (лежат в одной плоскости)

Пример:
$\vec{a} = (1, 0, 0)$, $\vec{b} = (0, 1, 0)$, $\vec{c} = (0, 0, 1)$
$(\vec{a}, \vec{b}, \vec{c}) = \begin{vmatrix}
1 & 0 & 0 \\
0 & 1 & 0 \\
0 & 0 & 1
\end{vmatrix} = 1$
Объём единичного куба = 1 — верно.

