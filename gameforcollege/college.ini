Вопрос 73. Переход из одной формы комплексного числа в другую.

Ответ:
Комплексное число $z$ может быть записано в трёх формах:

| Форма | Запись | Как получить |
|-------|--------|--------------|
| Алгебраическая | $z = a + bi$ | Исходная запись |
| Тригонометрическая | $z = r(\cos\varphi + i\sin\varphi)$ | $r = \sqrt{a^2+b^2}$, $\varphi = \arg z$ |
| Показательная | $z = r e^{i\varphi}$ | По формуле Эйлера $e^{i\varphi} = \cos\varphi + i\sin\varphi$ |

Схема переходов:

1. **Алгебраическая → тригонометрическая/показательная**  
   $$
   \begin{aligned}
   r &= \sqrt{a^2 + b^2} \\
   \varphi &= \begin{cases}
   \arctan \dfrac{b}{a}, & a > 0 \\
   \arctan \dfrac{b}{a} + \pi, & a < 0,\ b \geq 0 \\
   \arctan \dfrac{b}{a} - \pi, & a < 0,\ b < 0 \\
   \dfrac{\pi}{2}, & a = 0,\ b > 0 \\
   -\dfrac{\pi}{2}, & a = 0,\ b < 0
   \end{cases}
   \end{aligned}
   $$

2. **Тригонометрическая → алгебраическая**  
   $a = r \cos\varphi$, $b = r \sin\varphi$

3. **Тригонометрическая ↔ показательная**  
   $r(\cos\varphi + i\sin\varphi) \leftrightarrow r e^{i\varphi}$

Пример:
$z = -1 + i\sqrt{3}$
• $r = \sqrt{(-1)^2 + (\sqrt{3})^2} = 2$
• $\varphi = \pi - \arctan \sqrt{3} = \pi - \dfrac{\pi}{3} = \dfrac{2\pi}{3}$ (II четверть)
• Тригонометрическая: $z = 2 \left( \cos \dfrac{2\pi}{3} + i \sin \dfrac{2\pi}{3} \right)$
• Показательная: $z = 2 e^{i2\pi/3}$
