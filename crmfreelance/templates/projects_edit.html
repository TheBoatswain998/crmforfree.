{% extends 'base.html' %}

{% block content %}
  <!-- Page Header -->
  <div class="mb-6">
    <a href="/projects" class="text-blue-600 hover:text-blue-700 text-sm font-medium flex items-center gap-1 mb-2">
      <i class="icon-arrow-left"></i>
      <span>{{ t('projects') }}</span>
    </a>
    <h1 class="text-3xl font-bold text-gray-900">{{ t('edit_project') }}</h1>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6 max-w-2xl">
    <form method="post" class="space-y-5">
      <!-- Title -->
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
          {{ t('title') }} <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          id="title" 
          name="title" 
          required 
          value="{{ project['title'] }}"
          class="input-field"
        >
      </div>

      <!-- Client -->
      <div>
        <label for="client_id" class="block text-sm font-medium text-gray-700 mb-2">
          {{ t('client') }}
        </label>
        <select id="client_id" name="client_id" class="input-field">
          <option value="">{{ t('no_client') }}</option>
          {% for client in clients %}
            <option value="{{ client['id'] }}" {% if client['id'] == project['client_id'] %}selected{% endif %}>
              {{ client['name'] }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Status -->
      <div>
        <label for="status" class="block text-sm font-medium text-gray-700 mb-2">
          {{ t('status') }}
        </label>
        <select id="status" name="status" class="input-field">
          <option value="discussion" {% if project['status'] == 'discussion' %}selected{% endif %}>{{ t('discussion') }}</option>
          <option value="in_progress" {% if project['status'] == 'in_progress' %}selected{% endif %}>{{ t('in_progress') }}</option>
          <option value="paused" {% if project['status'] == 'paused' %}selected{% endif %}>{{ t('paused') }}</option>
          <option value="completed" {% if project['status'] == 'completed' %}selected{% endif %}>{{ t('completed') }}</option>
        </select>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <!-- Budget -->
        <div>
          <label for="budget" class="block text-sm font-medium text-gray-700 mb-2">
            {{ t('budget') }}
          </label>
          <input 
            type="number" 
            id="budget" 
            name="budget" 
            step="0.01"
            value="{{ project['budget'] or '' }}"
            class="input-field"
          >
        </div>

        <!-- Deadline -->
        <div>
          <label for="deadline" class="block text-sm font-medium text-gray-700 mb-2">
            {{ t('deadline') }}
          </label>
          <input 
            type="date" 
            id="deadline" 
            name="deadline" 
            value="{{ project['deadline'] or '' }}"
            class="input-field"
          >
        </div>
      </div>

      <!-- Payment Expectation -->
      <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="expect_payment" id="expect_payment" class="checkbox" {% if project['expect_payment'] %}checked{% endif %}>
          <div>
            <span class="font-medium text-gray-900 dark:text-white">Ожидается оплата до даты</span>
            <p class="text-sm text-gray-600 dark:text-gray-400">При включении автоматически создастся запись в платежах</p>
          </div>
        </label>
        
        <div id="payment_fields" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4" style="display: none;">
          <div>
            <label for="payment_due_date" class="block text-sm font-medium text-gray-700 mb-2">
              Срок оплаты
            </label>
            <input type="date" id="payment_due_date" name="payment_due_date" class="input-field" value="{{ project['payment_due_date'] or '' }}">
          </div>
          <div>
            <label for="payment_amount" class="block text-sm font-medium text-gray-700 mb-2">
              Сумма оплаты
            </label>
            <input type="number" id="payment_amount" name="payment_amount" step="0.01" class="input-field" placeholder="1000.00" value="{{ project['payment_amount'] or '' }}">
          </div>
        </div>
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
          {{ t('description') }}
        </label>
        <textarea 
          id="description" 
          name="description" 
          rows="4" 
          class="input-field"
        >{{ project['description'] or '' }}</textarea>
      </div>

      <!-- Actions -->
      <div class="flex gap-3 pt-4">
        <button type="submit" class="btn-primary flex-1">
          {{ t('save') }}
        </button>
        <a href="/projects" class="btn-secondary flex-1 text-center">
          {{ t('cancel') }}
        </a>
      </div>
    </form>
  </div>
{% endblock %}
