<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('profession') }} - Opusio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/lucide-static/font/lucide.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
  
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Logo & Title -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
          <i class="icon-user text-blue-600 text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">{{ t('profession') }}</h1>
        <p class="text-gray-600">{{ t('select_profession') }}</p>
      </div>
      
      <!-- Flash Messages -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="mb-6 space-y-3">
            {% for message in messages %}
              <div class="bg-green-50 border-l-4 border-green-500 text-green-700 px-4 py-3 rounded-r flex items-start gap-3">
                <i class="icon-circle-check text-xl flex-shrink-0"></i>
                <p class="text-sm">{{ message }}</p>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      
      <!-- Onboarding Form -->
      <form method="post" class="space-y-5">
        <!-- Profession Selection -->
        <div>
          <label for="profession" class="block text-sm font-medium text-gray-700 mb-2">
            {{ t('profession') }}
          </label>
          <div class="relative">
            <select 
              id="profession" 
              name="profession" 
              required 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            >
              <option value="">{{ t('select_profession') }}</option>
              <option value="дизайнер">Дизайнер</option>
              <option value="разработчик">Разработчик</option>
              <option value="копирайтер">Копирайтер</option>
              <option value="маркетолог">Маркетолог</option>
              <option value="фотограф">Фотограф</option>
              <option value="видеограф">Видеограф</option>
              <option value="консультант">Консультант</option>
              <option value="тренер">Тренер</option>
              <option value="другое">Другое</option>
            </select>
          </div>
        </div>
        
        <!-- Submit Button -->
        <button 
          type="submit" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition flex items-center justify-center gap-2 shadow-lg hover:shadow-xl"
        >
          <span>{{ t('save') }}</span>
          <i class="icon-arrow-right text-lg"></i>
        </button>
      </form>
      
      <!-- Skip Link -->
      <div class="mt-6 text-center">
        <a href="/dashboard" class="text-gray-600 hover:text-gray-900 text-sm font-medium">{{ t('skip') }}</a>
      </div>
    </div>
  </div>
  
</body>
</html>
